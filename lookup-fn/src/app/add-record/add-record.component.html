<div class="card m-2">
    <div class="card-body">
        <div class="row">
            <form [formGroup]="myForm" (submit)="onSubmit()">
                <div class="form-group w-25 m-2">
                    <label for="name">Name:</label>
                    <input class="form-control form-control-sm" type="text" id="name" required name="name" [(ngModel)]="record.Name" formControlName="name">
                </div>
                <div class="error" *ngIf="!myForm.controls['name'].valid && 
                    myForm.controls['name']?.touched">Valid Name is required
                </div>

                <div class="form-group w-25 m-2">
                    <label for="age">Age:</label>
                    <input class="form-control form-control-sm" type="text" id="age" required  name="age" [(ngModel)]="record.Age" formControlName="age">
                </div>
                <div class="error" *ngIf="!myForm.controls['age'].valid && 
                    myForm.controls['age']?.touched">Valid Age is required
                </div>

                <div class="form-group w-25 m-2">
                    <label for="city">City:</label>
                    <input class="form-control form-control-sm" type="text" id="city"  required  name="city" [(ngModel)]="record.City" formControlName="city">
                </div>
                <div *ngIf="!myForm.controls['city'].valid && 
                    myForm.controls['city']?.touched">Valid City is required
                </div>

                <div class="form-group w-25 m-2">
                    <label for="phone">Phone:</label>
                    <input class="form-control form-control-sm" type="text" id="phone" required  name="phone" [(ngModel)]="record.Phone" formControlName="phone">
                </div>
                <div class="error" *ngIf="!myForm.controls['phone'].valid && 
                    myForm.controls['phone']?.touched">Valid Phone is required
                </div>

                <div class="form-group w-25 m-2">
                    <label for="state">State:</label>
                    <input class="form-control form-control-sm" type="text" id="state" required  name="state" [(ngModel)]="record.State" formControlName="state">
                </div>
                <div class="error" *ngIf="!myForm.controls['state'].valid && 
                    myForm.controls['state']?.touched">Valid State is required
                </div>

                <button class="btn btn-secondary btn-sm col-1 text-center m-3" type="submit">Save</button>
                <br>
            </form>
        </div>
    </div>
</div>
