<div class="card m-5">
  <div class="card-body">
    <div class="row">
      <h3 class="text-center">Uploaded csv Inputs</h3>
      <div class="col-md-10">
        <input
          #search
          id="search"
          type="text"
          class="form-control"
          placeholder="Search by Name"
          aria-label="Search"
        />
      </div>
    </div>
  </div>

  <app-add-record *ngIf="isPopupVisible" (recordAdded)="onRecordAdded($event)"></app-add-record>
  <button class="btn btn-secondary btn-sm col-1 text-center m-3" *ngIf="!isPopupVisible" (click)="showPopup()">Add Record</button>

  <ngx-datatable class="card m-2 material" [rows]="rows" [columns]="columns" [columnMode]="'force'" [headerHeight]="50" [footerHeight]="50" [rowHeight]="'auto'" [scrollbarH]="false" [selectAllRowsOnPage]="false">

    <ng-template #ActionsTemplate  ngx-datatable-cell-template let-rowIndex="rowIndex" let-value="value" let-row="row">
      <button type="button" class="hover-none btn btn-outline-danger border-0" (click)='onDelete(row)'><img src="assets/image/delete.svg" width="20" height="20" /></button>

    </ng-template>
  </ngx-datatable>
</div>
